<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EAA</title>
    
    <style>
      :root {
        --bg-deep: #020203;
        --accent: #00eaff;
      }
      html, body {
        height: 100%; width: 100%; margin: 0; padding: 0;
        background-color: var(--bg-deep); /* Kills the White Screen */
        color: #e6edf3;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
      }
      #root { height: 100%; width: 100%; }

      /* Static Boot Screen (Visible before React loads) */
      .boot-layer {
        height: 100vh; width: 100vw;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: radial-gradient(circle at 50% -20%, #0f1724 0%, #020203 70%);
        z-index: 99999;
      }
      .boot-logo {
        width: 120px; height: 120px; object-fit: contain;
        filter: drop-shadow(0 0 15px rgba(0, 234, 255, 0.2));
        animation: pulse 3s infinite ease-in-out;
        margin-bottom: 30px;
      }
      .boot-spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-layer">
        <img src="/logo.png" class="boot-logo" alt="EAA" />
        <div class="boot-spinner"></div>
        <p style="margin-top: 20px; font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase;">
          System Boot Sequence
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
